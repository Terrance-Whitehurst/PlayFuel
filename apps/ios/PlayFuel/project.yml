name: PlayFuel
options:
  bundleIdPrefix: com.playfuel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

targets:
  PlayFuel:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/PlayFuel
        excludes:
          - Info.plist
    resources:
      - path: Resources/Assets.xcassets
        optional: true
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: PlayFuel
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [armv7]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playfuel.ios
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: "G89TZ927TJ"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Resources/PlayFuel.entitlements
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
    entitlements:
      path: Resources/PlayFuel.entitlements
      properties:
        com.apple.developer.applesignin: [Default]

schemes:
  PlayFuel:
    build:
      targets:
        PlayFuel: all
    run:
      config: Debug
      environmentVariables:
        - variable: PLAYFUEL_API_BASE_URL
          value: http://127.0.0.1:8000
          isEnabled: true
        - variable: SUPABASE_URL
          value: http://127.0.0.1:54321
          isEnabled: true
        - variable: SUPABASE_ANON_KEY
          value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          isEnabled: true
        - variable: DEBUG_JWT_SECRET
          value: super-secret-jwt-token-with-at-least-32-characters-long
          isEnabled: true
