    title: "HTTPBearer returns 403 not 401 for missing auth header — brief specifies 401"
    status: open
    priority: medium
    detail: "The TaskSpec and smoke test brief both say 'protected route w/o token → 401'.
             Actual: FastAPI HTTPBearer(auto_error=True) returns 403. Options:
             (a) Accept 403 as correct, update brief/docs;
             (b) Switch to HTTPBearer(auto_error=False) + custom dep that raises 401.
             Current test_routes_smoke.py asserts 403 (matching implementation)."

