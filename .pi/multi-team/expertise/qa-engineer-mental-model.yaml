findings:
  - category: BRIEF_DEFECT
    severity: medium
    title: "Brief specifies 401 for no-token path, actual behaviour is 403"
    detail: "FastAPI's HTTPBearer(auto_error=True) raises HTTP 403 (not 401) when no
             Authorization header is present. 401 is raised only by verify_supabase_jwt
             when a token IS present but invalid/expired. The smoke test function was
             renamed test_protected_route_without_token_returns_403 and asserts 403.
             The brief's expected status code should be corrected to 403."

  - category: SECURITY
    severity: low
    title: "jwt.InvalidTokenError detail reflected in 401 response body"
    detail: "auth.py: detail=f'Invalid token: {exc}' reflects the pyjwt exception
             message into the API response. May leak token structure hints to attackers
             probing with malformed tokens. Recommend: replace with generic 'Invalid token'
             without the exception detail."
    file: "apps/api/src/playfuel_api/auth.py"

  - category: UNUSED_IMPORT
    severity: low
    title: "PlayerProfileRow imported but unused in player_profiles.py"
    detail: "routes/player_profiles.py imports PlayerProfileRow from playfuel_api.models.db
             but none of the route handlers use it. Handlers return dict[str,Any] from
             Supabase directly. No runtime impact; lint warning only."
    file: "apps/api/src/playfuel_api/routes/player_profiles.py"

  - category: TEST_GAP
    severity: medium
    title: "no_next_match path (§G.5) has no dedicated test"
    detail: "All 5 SCENARIO_ACCEPTANCE cases supply a next_match. The no_next_match
             branch in _make_scenario (§G.5) — food_strategy=None, pickup bucket=None,
             gap_minutes=None, gap_status=no_next_match — is not exercised by any test
             in test_scenarios.py."

  - category: TEST_GAP
    severity: low
    title: "build_plan_envelope heat_emergency_text path untested"
    detail: "plan.py: the branch that sets heat_emergency_text when
             weather_flags['flag_extreme_heat_risk'] is True is not covered by any test.
             Only unit-testable path not reached by existing suite."

  - category: TEST_GAP
    severity: low
    title: "derive_schedule_confidence not unit-tested directly"
    detail: "plan.py: derive_schedule_confidence() is only exercised indirectly via
             generate_plan route. No standalone unit test for low/medium/high branches."

  - category: TEST_GAP
    severity: low
    title: "rewarm_up boundary (gap=59 vs gap=60) not explicitly tested"
    detail: "REWARM_UP_MIN_GAP=60 means rewarm_up is non-null only when gap >= 60.
             No test directly asserts rewarm_up=None for gap=59 and non-None for gap=60
             in isolation (covered implicitly in scenario acceptance but not as a named
             boundary test)."

  - category: REGRESSION_CHECK
    severity: info
    title: "No regressions found vs foundation files"

new_oqs:
