  cross_session_pattern_confirmed: |
    Silent-second-delegate is now confirmed at TEAM scope, not member scope.
    First delegate to a team in a session: works.
    Second delegate to the SAME team in the same session: silently drops.
    Affected this session: Engineering2 (FE2 first ping), Engineering1 (BE1 second delegate),
    Engineering3 (when used for Task #5 reroute — i.e., their second delegate after Task #3).
    Planning was UNAFFECTED because they only had one delegate (Task #12).
  reroute_playbook_v2:
    rule: "One substantive delegate per team per session. Plan accordingly."
    implication: |
      For multi-step work involving the same team, batch ALL of that team's asks into a
      single delegate. Do NOT split into 'foundation then body' even when the foundation
      author offers a clean handoff brief — the second delegate to ANY team will drop.
    when_blocked: |
      If a team's second delegate is needed mid-session, route to a team that has not yet
      been used in this session. If all teams have been used, wrap and recommend fresh session.
  workaround_discovered:
    pattern: "Lead authors, Member scribes"
    detail: |
      When a Lead's write domain doesn't cover the target path, the Lead can author the
      content in-message and assign a Member to do the file write in a single delegate cycle.
      Planning used this for Task #12 (PM scribed PRIVACY_V1.md to .pi/multi-team/expertise/).
      Counts as one delegate, not two — works around per-team budget AND write-domain restriction.


