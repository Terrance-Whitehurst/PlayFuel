# ----------------------------------------------------------------------------
# Delegation patterns that worked
# ----------------------------------------------------------------------------
patterns:
  sequential_handoff_engineering_then_planning:
    when: "A spec/constants doc needs engineering decisions baked in."
    flow: |
      1. delegate(Engineering1, "resolve OQs + produce a foundation memo")
      2. delegate(Planning, "author the canonical doc, here are Eng1's verbatim resolutions")
    why_it_worked: |
      Avoided the trap of asking Planning to make engineering trade-offs, AND
      avoided asking Engineering to commit final-form Planning prose.
      Each team operated in its strength.

  spot_check_planning_decisions:
    rule: |
      Planning's "decisions made beyond source" table is gold — review items flagged
      "Worth a look" or "Invented" before treating the doc as binding.
    this_session_items_to_revisit:
      - "RULES_CONSTANTS_V1.md item #4 (re-warm-up nulled when gap < 60min) — derived, not explicit in source"
      - "RULES_CONSTANTS_V1.md §J change-control / semver rules — invented; needs Eng1 + Planning sign-off"

