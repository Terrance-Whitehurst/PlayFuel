      with envelope shape when needed.
  patterns_added:
    stale_invariant_whitelist_after_constants_widening:
      detail: |
        When a constants table widens (new keys / new value combos), grep for the
        OLD values across services/ — invariant checks, whitelists, validation lists
        often hold stale subsets. SEC-6 (_CANONICAL_DURATIONS) is the canonical example.
    format_field_str_vs_literal:
      detail: |
        Closed-set string fields on Pydantic Create models should always be
        Literal[...] / Enum, not Optional[str]. Catches dirty input at the API
        boundary instead of relying on downstream combo validators.
    sequential_three_team_chain:
      when: "Substantial product feature spanning spec → build → verify."
      flow: "Planning (canonical spec) → Engineering (build to spec) → Validation (audit vs spec)"
