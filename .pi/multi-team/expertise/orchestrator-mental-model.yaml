  flow: Planning (IA spec) → Engineering (build) → Validation (smoke + UX sniff). 3 delegates.
  outcomes:
    NUTRITION_FIRST_IA_V1: SHIPPED ✅. 693-line canonical spec at .pi/multi-team/expertise/.
    IA_build: SHIPPED ✅. Migration 0008 (per-match plans), envelope arrays, NextAction,
      ScheduleStripView, NextActionCard, WeatherCard compact pill, full dashboard reorder.
    IA_validation: SHIPPED ✅. 256 passed / 1 xfail / safety override intact / UX glance-test passes.
  test_growth: 231+1 → 256+1 (+25 IA tests).
  planning_verification_catch_2: |
    Second consecutive PM verification catch. Brief assumed plans.match_id existed;
    PM read 0002_tables.sql first and confirmed it does NOT. Migration 0008 correctly
    scoped to ADD COLUMN + partial unique index instead of an index-only no-op that
    would have failed with 'column does not exist'. The 'PM reads existing schema
    before scribing migration spec' rule is now battle-tested across 2 specs.
  engineering_proactive_safety_fix: |
    BD picked up the SEC-6 archetype reminder in the brief and proactively widened
    `_CANONICAL_DURATIONS` from {75,120,180} to all 9 valid singles+doubles values
    while doing the envelope-shape work. Stale-invariant-whitelist pattern recognition
    is now embedded in BD's read of every constants-touching brief. Reinforced.
  engineering_caught_spec_bug: |
    Spec §D used snake_case event kinds (warmup, match_start, hydration_check) but
    actual TimelineEventKind enum is camelCase (warmUp, match, hydration). BD read
    enum source first and adapted both NEXT_ACTION_COPY_MAP and HEAT_SENSITIVE_KINDS
    to real values. Otherwise heat-prepend would have silently failed at runtime
    (no error, just no prepend ever firing).
  validation_findings:
    OQ-IA-9: 🔴 routes/plans.py uses plain INSERT after 0008 added unique index on
      (match_id, match_type) WHERE match_id IS NOT NULL. Re-generate-plan will 500.
      Demo-safe (single generate per session) but pre-TestFlight blocker.
    QA-IA-1: 🟡 When envelope.hasBothTypes, segmented Picker renders above EmergencyBanner
      pushing banner to visual position #1. Demo-safe (Dallas seed singles-only) but
      cosmetic 5-line hoist needed post-demo to keep banner truly at #0.
    SEC-8: ⚪ Stale violation message in llm_safety "Only 75, 120, 180 are canonical"
      after the SEC-6 widening fix; cosmetic.
  ux_sniff_test_passed: |
    "Parent in parking lot at 8:45 AM sees EmergencyBanner (Dallas extreme heat),
    immediately the calm coach summary, then match chip, then NextActionCard reading
    'In 15 min — Pre-match meal / Light, easy carbs.' Glance-test passing: actionable
    guidance in under 2 seconds. Weather is a small pill at the bottom; parent who
    already feels 88°F can ignore it." — SecRev/QA synthesis.
  patterns_added:
    gating_safety_check_in_brief:
      detail: |
        When an IA / visual-prominence delegate touches anything safety-adjacent,
        the SecRev brief MUST lead with an explicit 🔴 GATING conditional describing
        what must stay put. Example here: 'EmergencyBanner at #0 when extreme_heat_risk
        — if anywhere else, that's a blocker.' Avoids ambiguity about which findings
        block recording.
    insert_vs_upsert_after_unique_index:
      detail: |
        Any migration that adds a UNIQUE index (full or partial) should auto-trigger
        a `grep '\.insert(' apps/api/` audit on every route hitting that table.
        OQ-IA-9 was caused by 0008 adding the index without an upsert sweep.
        Add to spec/migration checklist: "after UNIQUE index, audit INSERTs."
  proven_total_delegate_count_through_session_so_far: |
