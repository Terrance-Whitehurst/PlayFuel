# Team observations
# ----------------------------------------------------------------------------
team_dynamics:
  Engineering1:
    strengths:
      - Decisive on engineering trade-offs; closed OQ-05/13/14 with rationale and forward-compatible defaults (duration_overrides kwarg).
      - Surfaces *new* OQs proactively (added OQ-A through OQ-G).
      - Cites source sections precisely.
    quirks:
      - Team members (Backend Dev 1, Frontend Dev 1) went silent on large file-write payloads to session dir. Lead is constrained from writing under sessions/ directly. Workaround used: Lead returned full structured content inline; Planning wrote the actual file.
    delegation_tip: |
      When you need a file written, route the writing step to whichever team owns that path.
      Engineering1 is great for *deciding* and *drafting*; pair with Planning (or another team
      that has the right write scope) for *committing*.
  Engineering2:
    strengths:
      - Lead is reflective and surfaces failure modes clearly with diagnostic detail.
      - Lead correctly proposed cross-team rerouting ("borrow Frontend Dev 3") when own members stalled.
    quirks:
      - Both members (Frontend Dev 2, Backend Dev 2) hit the silent-failure pattern fast — first small ping works, every follow-up drops.
    notes: owns mobile/SwiftUI; Task #3 prototype NOT shipped this session due to member stalls.
  Engineering3:
    strengths:
      - Most reliable team this session — shipped Task #4 cleanly first try.
      - Made two additive deviations (venue lat/lng, full §E weather flags) and proactively justified both.
      - Resolved OQ-G in-flight without needing a second round trip.
      - Honest about validation gaps (no supabase CLI in sandbox — manual greps used).
    notes: owns data/Supabase; Task #4 ✅ at db/supabase/.
    surfaced_OQ: "OQ-H — weather_condition enum: do we need partly_cloudy/fog/haze? Blocks Phase 4."
  Planning:
    strengths:
      - Produces tight, tabular, copy-paste-ready specs.
      - Self-flags decisions made *beyond* the source material (transparency table at the end).
    quirks:
      - Will invent reasonable structures (e.g., semver change-control rules in §J of RULES_CONSTANTS_V1) when source is silent. Always ask them to flag invented vs. derived decisions.
      - **Hit silent-failure pattern after heavy Phase 0 work.** Two retries on Task #12 (Privacy doc) returned only the team header and zero file written. Likely a per-team session quota.
    delegation_tip: |
      Give Planning the exact file path, the exact section structure, and any verbatim
      Engineering resolutions to bake in. They will return path + TOC + flagged decisions
      without prompting if asked.
      AVOID burning Planning on small polish tasks before their real Phase 1+ work —
      they appear to have a per-session budget.

# ----------------------------------------------------------------------------
# Delegation patterns that worked
# ----------------------------------------------------------------------------
patterns:
  sequential_handoff_engineering_then_planning:
    when: "A spec/constants doc needs engineering decisions baked in."
    flow: |
      1. delegate(Engineering1, "resolve OQs + produce a foundation memo")
      2. delegate(Planning, "author the canonical doc, here are Eng1's verbatim resolutions")
    why_it_worked: |
      Avoided the trap of asking Planning to make engineering trade-offs, AND
      avoided asking Engineering to commit final-form Planning prose.
      Each team operated in its strength.

  spot_check_planning_decisions:
    rule: |
      Planning's "decisions made beyond source" table is gold — review items flagged
      "Worth a look" or "Invented" before treating the doc as binding.
    this_session_items_to_revisit:
      - "RULES_CONSTANTS_V1.md item #4 (re-warm-up nulled when gap < 60min) — derived, not explicit in source"
      - "RULES_CONSTANTS_V1.md §J change-control / semver rules — invented; needs Eng1 + Planning sign-off"

# ----------------------------------------------------------------------------
# Domain-restriction notes
# ----------------------------------------------------------------------------
domain_notes:
  orchestrator_writable: [".pi/multi-team/expertise/"]
  orchestrator_readable_only: ["specs/", "everything else under PlayFuel/"]
  consequence: |
    I cannot update specs/PLAN.md status checkboxes directly. Track Phase 0 status here
    and in RULES_CONSTANTS_V1.md frontmatter. If user wants PLAN.md updated, they need to
    delegate the write or do it themselves.
