  spec_compliance_audit: |
    Validation cross-referenced every §H item against disk, all ✅. Audit pattern
    (parallel QA+SecRev → merge) repeated successfully.
  new_findings:
    SEC-6: |
      services/llm_safety.py::_CANONICAL_DURATIONS = {"75","120","180"} — stale after
      constants widening. Masked by TemplateProvider not emitting numeric durations,
      but WILL break with real Anthropic/OpenAI providers. Fix when OQ-LLM-1/2 ship.
    SEC-7: |
      MatchCreate.format is Optional[str] not Literal["singles","doubles"] — closed-set
      fields should be Literal/enum-typed at the API boundary. Combo helper is the
      only safety net today. Cosmetic; tighten before public API exposure.
    OQ-DBL-7: |
      plans.match_type shipped nullable vs spec's NOT NULL DEFAULT 'singles'. Routes
