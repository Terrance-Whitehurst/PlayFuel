  # ── Observations ──────────────────────────────────────────────────────────
  observations:
    - date: "2026-04-27"
      note: >
        IA pivot (Nutrition-First) verified: EmergencyBanner is immovable at #0, driven directly
        by plan.weather.extremeHeatRisk. The WeatherCard compact pill is purely a presentation
        concern — its @State isExpanded has zero coupling to the safety override. This was the
        primary gating security check for the IA pivot and it passed cleanly.
    - date: "2026-04-27"
      note: >
        The docstring/comment discrepancy in routes/plans.py is a pattern to watch:
        the top-level docstring says 'upsert on duplicate' but the implementation is INSERT.
        When reviewing routes, grep for 'upsert' claims and verify the actual client call.
    - date: "2026-04-27"
      note: >
        The SEC-6 archetype (stale-whitelist-after-constants-widening) was caught in doubles
        and fixed by BD. A secondary artifact surfaced: the error message text was not updated.
        Lesson: when widening a canonical set, grep for ALL references to the old values —
        not just the frozenset definition, but also violation message strings.
    - date: "2026-04-27"
      note: >
        NextAction rules engine owns all safety-critical wording (heat prepend is hardcoded).
        LLM never authors or modifies NextAction content. Correct architecture.
    - date: "2026-04-27"
      note: >
        Header Bubbles pivot verified: EmergencyStrip (compact) is NOT a regression from the
        full EmergencyBanner. The strip is full-width red, non-self-dismissable, renders at #0
        above the Picker. Its @State sheetShown controls ONLY the HeatGuidanceSheet — not strip
        visibility. This is the right architecture for a compact-but-forced safety surface.
    - date: "2026-04-27"
      note: >
        Key security pattern confirmed: when demoting a safety surface's visual weight,
        verify the @State variable inventory — any local @State that controls its OWN
        visibility (not a child sheet's) is the regression signature. EmergencyStrip has
        ONLY sheetShown, which is scoped to the sheet. Clean.
    - date: "2026-04-27"
      note: >
        QA-IA-1 resolved in header bubbles delegate. EmergencyStrip in envelopeContent()
        at line 116; Picker at line 121. The carryover finding (banner below picker when
        hasBothTypes) is definitively closed. Lesson: carry safety-positioning findings
        forward explicitly until the file:line evidence shows correct ordering.
    - date: "2026-04-28"
      note: >
        Food Deck + Map (Phase 8.3) verified clean. Key pattern: MKMapItem.openInMaps()
        is always safe (no URL injection); mapItem.name = string is display metadata
        NOT a URL component. Grep for URL(string:) / "maps://" is the injection check.
    - date: "2026-04-28"
      note: >
        SEC-FOOD-1 archetype: a new safety string was introduced inline in a View
        rather than being added to HardCodedStrings. The convention (all safety strings
        in the registry) is solid but depends on author discipline. Lesson: when
        reviewing new sheets that show disclaimers or safety guidance, grep for
        .font(.caption2) + Text literals — that's the visual signature of a disclaimer
        that may be hardcoded. Also grep for 'allerg' / 'consult' / 'professional'.
    - date: "2026-04-28"
      note: >
        Force-unwrap-after-filter pattern (option.lat! after filter for non-nil lat) is
        acceptable in SwiftUI ForEach bodies when the filter and unwrap are co-located.
        Risk: if filter is removed or condition changes, crash. Flag as ⚪ to track.
    - date: "2026-04-28"
      note: >
        Player scouting sanitization audit: the order strip→truncate→scan is security-critical.
        Truncating BEFORE stripping URLs can let a partial fragment (e.g. 'https://x') slip
        through the 200-char boundary. scouting.py gets this right. Add to code-review checklist:
        verify order is always strip→truncate→scan.
    - date: "2026-04-28"
      note: >
        New archetype: validate_explanation needs a verbatim-note-reproduction check before
        any real LLM provider ships. The TemplateProvider is safe because it only uses the count,
        but an Anthropic/OpenAI model that quotes body_paraphrasable verbatim would pass all
        existing checks (since redaction already ensured no §C phrase). SEC-SCOUT-1 tracks this.
    - date: "2026-04-28"
      note: >
        Pydantic camelCase rule confirmed critical: all request-body models (Create/Update/Input)
        MUST have model_config = _CAMEL. Verified in models/api.py at PlayerCreate:399,
        PlayerUpdate:409, PlayerNoteCreate:434, PlayerNoteUpdate:443 — all correct.
        This is now a mandatory code-review checklist item; without it iOS gets 422 on every call.
    - date: "2026-04-28"
      note: >
        Post-match eval auto-note loop: the key design rule is raw-body-at-storage,
        sanitize-at-LLM-input. This separation is correct and intentional — the parent's
        authentic words are preserved in player_notes.body; privacy protection fires at the
        last responsible moment (plan gen) via scouting.py. When reviewing new features that
        store parent-authored text, verify they do NOT call sanitize_note_for_llm at write time.
    - date: "2026-04-28"
      note: >
        New SELECT-then-INSERT/UPDATE idempotency pattern in post_match_sync.py is correct
        for MVP but lacks DB-level enforcement. Any service that needs true idempotency should
        have a UNIQUE partial index to back up the application-layer check. SEC-EVAL-1 tracks this.
        Pattern: app-layer dedup is necessary but insufficient; DB constraint is the backstop.

