security_reviewer_mental_model:

  project: PlayFuel
  last_updated: "2026-04-27"
  session: moh9uivm3dxv
  last_nutrition_ia_audit: "2026-04-27"

  # ── Auth & Trust Boundaries ──────────────────────────────────────────────
  auth:
    mechanism: supabase_jwt
    dependency: verify_supabase_jwt (FastAPI Depends)
    client: authed_client — anon_key init + user JWT override via postgrest.auth()
    service_role_key:
      loaded_in: settings.supabase_service_role_key
      used_in: "NOT used in any route handler. MVP prohibition documented in db.py."
      risk: "Held in Settings singleton in memory. Route path is clean."
    coverage:
      plans: all 3 endpoints ✅
      matches: all 5 endpoints ✅
      tournaments: all 6 endpoints ✅
      player_profiles: all 5 endpoints ✅
    rls:
      enforced_by: postgres row level security (Supabase)
      pattern: "auth.uid() = user_id (direct) or EXISTS subquery one-hop via tournament_id"
      files:
        - db/supabase/migrations/0003_rls.sql
      tables_covered:
        - users, player_profiles, tournaments, matches, match_scenarios
        - weather_snapshots, food_options, plans, feedback
      note: "Column additions (0005–0008) inherit table RLS automatically in PostgreSQL."

  # ── API Key Posture ───────────────────────────────────────────────────────
  api_keys:
    pattern: pydantic-settings BaseSettings (env_file=".env")
    keys:
      - google_places_api_key, anthropic_api_key, openai_api_key
      - supabase_service_role_key
    verified:
      no_hardcoded_values: true
      no_key_logging: true
      env_example_placeholders_only: true

  # ── Safety & Disclaimer Architecture ─────────────────────────────────────
  disclaimers:
    source_of_truth: ".pi/multi-team/expertise/SAFETY_DISCLAIMERS.md"
    constants_file: "apps/api/src/playfuel_api/rules/hard_coded_strings.py"
    constants:
      USER_DISCLAIMER: "§A verbatim — loaded from hard_coded_strings; unchanged through all phases"
      HEAT_EMERGENCY_TEXT: "§B v1.1 candidate — OQ-06 pending legal review (pre-App Store blocker)"
    chain:
      - hard_coded_strings.py → build_explanation_input (llm.py:400,470-471, no transform)
      - PlanExplanationInput → TemplateProvider._build_safety_note() (f-string join only)
      - safety_note → sanitize_or_fallback() (no mutation)
      - safety_note → iOS PlanSummaryCard Text() (plain render, no transform)
    chain_status: VERIFIED verbatim end-to-end through Nutrition-First IA pivot
    emergency_banner:
      trigger: plan.weather.extremeHeatRisk (Bool on WeatherBlock model)
      position: "#0 IMMOVABLE — first conditional in TournamentDashboardView.planContent()"
      coupling_to_weathercard: NONE — EmergencyBanner reads plan model; WeatherCard @State isExpanded
        is purely local presentation state. Compact pill does NOT gate the banner.
      ia_pivot_regression: NONE — verified 2026-04-27

  # ── LLM Safety Guardrails ─────────────────────────────────────────────────
  llm_safety:
    file: apps/api/src/playfuel_api/services/llm_safety.py
    prohibited_phrases:
      count: 14
      verbatim_section_c: 8
      derived_patterns: 6
    checks_in_validate_explanation:
      1: prohibited phrase (case-insensitive substring scan)
      2: user_disclaimer verbatim in safety_note
      3: heat_emergency_text verbatim when extreme_heat_risk
      4: restaurant hallucination — no-op for non-empty food lists (SEC-1)
      5: non-canonical duration adjacent to "min" — now checks all 9 canonical values (SEC-6 RESOLVED)
    canonical_durations_current:
      singles: ["75", "120", "180"]
      doubles_best_of_3: ["60", "90", "135"]
      doubles_pro_set_8: ["45", "70", "100"]
      status: "All 9 in _CANONICAL_DURATIONS frozenset as of 2026-04-27 SEC-6 fix"
      stale_error_message: "validate_explanation violation text still says 'Only 75, 120, 180 are allowed' — cosmetic SEC-8"
    sanitize_or_fallback:
      behavior: "falls back to TemplateProvider on any violation; never raises"
      concern_sec2: "except Exception in routes/plans.py per-match loop wraps entire LLM block"
    next_action_safety:
      module: "apps/api/src/playfuel_api/rules/next_action.py"
      heat_prepend: "_HEAT_PREPEND = 'Extreme heat — extra hydration. ' (hardcoded line 51)"
      function_purity: "pure — no LLM calls, no I/O; 'now' injected for testability"
      sensitive_kinds: ["match", "warmUp", "hydration"]

  # ── Findings Tracker ─────────────────────────────────────────────────────
  findings:
    - id: SEC-1
      severity: medium
      status: open
      description: "Restaurant hallucination check disabled when food_recommendations non-empty"
      blocker_for_demo: false
      blocker_for_production_llm: true

    - id: SEC-2
      severity: medium
      status: open
      description: "except Exception in routes/plans.py per-match loop swallows LLM block"
      blocker_for_demo: false
      blocker_for_production_llm: true

    - id: SEC-3
      severity: medium
      status: open
      description: "No direct test for 'Keep playing through pain.' phrase"
      blocker_for_demo: false
      fix: "add test_prohibited_phrase_keep_playing()"

    - id: SEC-4
      severity: low
      status: open (OQ-06)
      description: "HEAT_EMERGENCY_TEXT pending legal review"
      blocker_for_app_store: true

    - id: SEC-5
      severity: low
      status: informational
      description: "supabase_service_role_key in Settings singleton; not in request path"

    - id: SEC-6
      severity: medium
      status: RESOLVED (2026-04-27 BD)
      description: "_CANONICAL_DURATIONS expanded from {75,120,180} to all 9 canonical durations"
      fix_applied: "llm_safety.py:55-62 + test_llm_safety.py 90→95"

    - id: SEC-7
      severity: low
      status: open
      description: "MatchCreate.format typed Optional[str] not Literal['singles','doubles']"
      fix: "Change to Optional[Literal['singles', 'doubles']]"

    - id: OQ-IA-9
      severity: red_pre_testflight_blocker
      status: NEW (2026-04-27)
      description: >
        routes/plans.py per-match persist uses plain INSERT not upsert.
        The partial unique index plans_match_id_match_type_uq will raise a PG unique
        constraint violation (23505) on any re-generate call (second generate for same match).
        Demo safe (single generate on empty table). TestFlight blocker (parents regenerate).
      file: "apps/api/src/playfuel_api/routes/plans.py:~254"
      fix: >
        client.table('plans').upsert({...}, on_conflict='match_id,match_type').execute()
        Note: omit 'id' from the payload or use a stable UUID5(namespace, f'{match_id}:{match_type}').
      timing: "Fix before TestFlight, not required before demo"

    - id: SEC-8
      severity: cosmetic
      status: NEW (2026-04-27)
      description: >
        validate_explanation check-5 violation message says 'Only 75, 120, 180 are allowed'
        after SEC-6 expanded the frozenset to 9 values. Logic is correct; message is stale.
      file: "apps/api/src/playfuel_api/services/llm_safety.py:~155"
      fix: "Update violation message to list all canonical durations or say 'not a canonical duration'"

  # ── Observations ──────────────────────────────────────────────────────────
  observations:
    - date: "2026-04-27"
      note: >
        IA pivot (Nutrition-First) verified: EmergencyBanner is immovable at #0, driven directly
        by plan.weather.extremeHeatRisk. The WeatherCard compact pill is purely a presentation
        concern — its @State isExpanded has zero coupling to the safety override. This was the
        primary gating security check for the IA pivot and it passed cleanly.
    - date: "2026-04-27"
      note: >
        The docstring/comment discrepancy in routes/plans.py is a pattern to watch:
        the top-level docstring says 'upsert on duplicate' but the implementation is INSERT.
        When reviewing routes, grep for 'upsert' claims and verify the actual client call.
    - date: "2026-04-27"
      note: >
        The SEC-6 archetype (stale-whitelist-after-constants-widening) was caught in doubles
        and fixed by BD. A secondary artifact surfaced: the error message text was not updated.
        Lesson: when widening a canonical set, grep for ALL references to the old values —
        not just the frozenset definition, but also violation message strings.
    - date: "2026-04-27"
      note: >
        NextAction rules engine owns all safety-critical wording (heat prepend is hardcoded).
        LLM never authors or modifies NextAction content. Correct architecture.

