project: PlayFuel (Junior Tennis Tournament Assistant)
last_updated: "2026-04-28T-food-deck-and-map-spec"

positioning:
  one_sentence: "iPhone app for junior tennis parents — schedule-aware, weather-aware, food-aware tournament-day planner."
  core_principle: "Rules engine first. LLM as explanation layer only. Never let the LLM invent the plan."
  first_milestone: "Parent creates tournament with 9AM + 1PM matches in Dallas (88F/humid) and gets a weather-aware, food-aware, scenario-based plan that feels like a coach gave it to them."

