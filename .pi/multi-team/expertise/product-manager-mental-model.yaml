prioritization_rationale:
  say_no_to:
    - "Menu scraping — fragile, legal risk, maintenance sink. Templates cover 80% of value."
    - "Coach dashboard — real users are parents first. Coach tier is post-MVP."
    - "Fine-tuning / on-device LLM — engineering cost far exceeds Phase 0-6 value."
    - "Social / rankings — not the product. Distraction."
  say_yes_to:
    - "Scenario cards — the emotional core of the product. Parent sees long-match scenario and knows to send someone for food early. This is the aha moment."
    - "Weather adjustment — high impact, low engineering cost once weather API is wired up."
    - "Bag-food fallback — handles the zero-nearby-options edge case with zero extra cost."

