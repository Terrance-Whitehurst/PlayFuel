# Validation Lead — Mental Model

# Recurring failure modes / coverage gaps / risk patterns observed across sessions.

domain_routing:
  - id: qa_engineer_cannot_write_to_apps
    observed: 2026-04-26 / session mogfjh9hslqr (re-confirmed 2026-04-27 same session)
    detail: |
      QA Engineer's domain is read-only on `apps/`. Re-confirmed Task #13:
      first write attempt to apps/api/src/playfuel_api/tests/ returned
      'Domain: write denied'. Restriction is stable across the session — not
      a transient.
    playbook: |
      Default to staging in `.pi/multi-team/sessions/<session>/staged_validation/`
      mirroring the target tree under apps/. Inform Orchestrator the staging
      path so they can fire an Engineering scribe delegate. Do NOT waste a
      direct-write attempt in future sessions unless Orchestrator explicitly
      says domain rules changed.
    related_pattern: |
      Pre-author the README append as a separate file (e.g. README_APPEND.md)
      so the scribe pass is purely additive (one Edit, append-only) instead of
      requiring the scriber to construct prose.

invariant_check_patterns:
  - id: read_dont_trust
    rule: |
      Always verify Engineering's self-reported invariant compliance by reading
      code, not the report. Engineering reports are usually accurate but can
      mask brief defects (see qa_brief_defects below).

  - id: spec_drift_at_framework_boundaries
    observed: 2026-04-26
    detail: |
      Briefs that specify HTTP status codes can drift from framework defaults.
      Example: orchestrator brief said "no token → 401" but FastAPI's
      HTTPBearer(auto_error=True) raises 403 for missing header (401 only when
      token present but invalid). Always cross-reference framework semantics
      before treating brief status codes as ground truth.

security_smells_to_check_first:
  - jwt_error_strings_leaked_in_response_bodies   # f"Invalid token: {exc}" → leaks library internals
  - algorithm_allow_list_present                  # algorithms=["HS256"] (no None/RS256 confusion)
  - authenticated_client_factory_has_no_unauth_path  # every protected dep threads JWT
  - uuid_path_param_validation_at_ingest          # FastAPI typing catches this for free
  - rls_returns_404_for_both_missing_and_unauthorized  # prevents existence-disclosure

test_gap_archetypes:
  - branch_with_None_input_uncovered              # "no_next_match" / null arg paths
  - boundary_isolation_tests_missing              # named test for the exact tipping value (e.g., gap=59 vs 60)
  - negative_auth_paths_uncovered                 # expired / missing-claim / malformed-claim
  - derived_helpers_only_tested_indirectly        # confidence functions, formatters

return_format_for_qa_pass:
  - matrix_first_then_findings                    # 12-row PASS/FAIL/N/A table is the headline
  - file_line_evidence_for_every_pass             # claim without evidence == not verified
  - severity_tags_on_findings                     # 🔴 medium / 🟡 low — orchestrator needs to triage
  - stage_files_in_session_dir_when_blocked       # never silently invent fixtures

multi_member_validation_pattern:
  - id: split_qa_and_security_in_parallel
    observed: 2026-04-27 / session moh9uivm3dxv (Demo Path Delegate 5)
    detail: |
      For demo-readiness audits with both functional and security scope:
      delegate QA Engineer (sections A/B/C/E — backend smoke, iOS surface,
      DB, demo checklist) and Security Reviewer (section D — auth posture,
      key logging, disclaimer pass-through, RLS) IN THE SAME tool block.
      Both shipped clean first-try with crisp file:line evidence.
    playbook: |
      1. Each member writes their findings to a separate file under the
         session dir (`qa-findings.md`, `security-findings.md`) — both have
         write access on `.pi/multi-team/`.
      2. After both return, fire ONE additional QA delegate to compose the
         consolidated `demo-readiness-report.md` (TL;DR + condensed tables
         + cross-source severity-sorted findings + pre-record action list +
         appendix links to the two source files).
      3. Do NOT have the validation lead try to merge by hand — your
         write domain only includes the mental-model file. The QA Engineer
         is your scribe for `.pi/multi-team/sessions/<sid>/`.
      Total: 3 delegates (QA + SecRev parallel, then QA merge) for a full
      demo-readiness pass. ~10 min wall-clock when briefs are tight.

  - id: tight_brief_with_explicit_commands
    detail: |
      Audit briefs that include the exact shell commands to run (with
      pipe-to-tail, with explicit grep patterns) ship clean and produce
      copy-pasteable evidence. Don't say 'check the test count' — say
      'run `pytest -v 2>&1 | tail -60` and capture the summary line'.
      Don't say 'verify no splice marker' — say 'grep -n PHASE 4/5 SPLICE
      apps/ios/.../Repository.swift → expect 0 matches'.

value_added_findings:
  - id: env_var_silent_failures
    observed: 2026-04-27 / session moh9uivm3dxv
    detail: |
      QA caught that LLM_PROVIDER=auto + live ANTHROPIC_API_KEY in shell
      env would route to the unimplemented stub at runtime, returning
      `llmSummary=null` and silently hiding the new PlanSummaryCard from
      the demo. The route's broad `except Exception` made the failure
      logs-only — no test failure, no API error. Pattern to remember:
      'auto-detect provider' factories paired with shell-env credentials
      are a recurring silent-failure surface. Always check whether the
      demo operator's shell could divert traffic to an unimplemented
      path.
  - id: stale_invariant_whitelists_after_constants_widening
    observed: 2026-04-27 / session moh9uivm3dxv (doubles delegate)
    detail: |
      When a constants table widens (e.g. SCENARIO_DURATIONS_MIN goes from
      flat singles dict → keyed-by-(match_type,format) nested dict), grep
      for any OTHER frozenset / whitelist / regex that hardcoded the OLD
      value set. SEC-6 caught: services/llm_safety.py held
      `_CANONICAL_DURATIONS = {"75","120","180"}` — never updated when
      doubles added 60/90/135/45/70/100. False-positive fires on every
      doubles plan; masked at demo time only because TemplateProvider
      doesn't emit numeric durations. Real LLM providers would break.
      Pattern: any time a constants table grows, immediately
      `grep -rn '<old-value>'` across services/ for stale duplicates.

  - id: format_field_str_vs_literal_at_API_boundary
    observed: 2026-04-27 / session moh9uivm3dxv (doubles delegate)
    detail: |
      Pydantic `Optional[str]` for fields with a known closed value set is
      a recurring 🟡. POST /matches accepted any string for `format` and
      `doubles_format`; only an internal helper rejected invalid combos.
      Demo-safe (defense in depth) but lets dirty data reach DB. Always
      check at every API model: closed-set fields → `Literal[...]` or
      enum, not `str`.

  - id: gating_safety_check_in_brief
    observed: 2026-04-27 / session moh9uivm3dxv (nutrition-first IA delegate)
    detail: |
      When a delegate's source-of-change is an IA / visual prominence pivot,
      pre-call out the SAFETY OVERRIDE as the gating check in the SecRev
      brief. Mark it 🔴 GATING explicitly. The whole point of demoting one
      thing visually is that you might accidentally demote the safety logic
      paired with it. SecRev returned a single-line PASS on this with
      file:line proof — exactly what was needed.
    playbook: |
      Pattern: every IA / reorder delegate, the SecRev brief leads with the
      safety conditional that MUST stay at position #0 (or whatever the
      contractually-correct position is). If it moved, blocker. If its
      trigger weakened (e.g., gated behind a collapse @State), blocker.
      This caught QA-IA-1 cleanly: the EmergencyBanner is at #1 (behind a
      conditional Picker), so technically a finding, but the safety trigger
      itself is intact and the Dallas demo seed is singles-only so the
      Picker never renders. Severity: 🟡 not 🔴.

  - id: insert_vs_upsert_after_unique_index
    observed: 2026-04-27 / session moh9uivm3dxv (nutrition-first IA delegate)
    detail: |
      When a migration adds a unique constraint / partial unique index, audit
      every INSERT statement against that table. OQ-IA-9: migration 0008
      added `plans_match_id_match_type_uq WHERE match_id IS NOT NULL`, but
      `routes/plans.py` still uses plain `.insert()`. First generate succeeds;
      every subsequent generate 500s. Demo-safe (single generate per
      session); pre-TestFlight blocker (parents will regenerate after
      editing matches). Pattern: any time a migration adds a UNIQUE index,
      the closing-out validation should `grep -n '\.insert(' routes/`
      against the affected table and verify each is either intentionally
      one-shot or migrated to upsert.

  - id: live_api_vs_preview_fixture_drift
    observed: 2026-04-27 / session moh9uivm3dxv
    detail: |
      The `FakeData.dallasTimeline` has 12 events (used by SwiftUI
      previews); the live `build_timeline()` returns ~3 events. Once the
      hybrid splice is retired, demos that were validated against the
      preview fixture suddenly look anemic on real hardware. Always
      compare what the preview shows against what the live API returns
      after splice removal — the eval harness covers correctness but not
      visual richness.
