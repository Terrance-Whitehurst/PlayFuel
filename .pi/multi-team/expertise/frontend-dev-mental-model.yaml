patterns_learned:
  - "anti-silent-failure: write files step by step, verify with find/grep before returning"
  - "FakeData UUID determinism: use fixed UUID strings (AAAA0001-...) so Phase 3 integration tests can reference known IDs"
  - "SwiftUI Package iOS 17+: executableTarget with @main App protocol works cleanly"
  - "UnevenRoundedRectangle is iOS 17+ only — safe here but document if targeting older OS"
  - "TimelineEventKind switch exhaustiveness: TimelineView.swift has TWO exhaustive switches (kindIcon + kindColor). Adding new enum cases requires updating both. No default: clause — compile breaks immediately on missing cases."
  - "Enum sync discipline: TimelineEventKind raw values are camelCase strings; Python backend uses identical strings in playfuel_api/models/enums.py. Any new case must be added to BOTH simultaneously."
  - "Stored-property defaults vs synthesized memberwise init: in some Swift/macOS toolchain combos, struct properties with `= default` confuse the synthesized init for Codable structs. Safe pattern: NEVER use stored-property defaults on Codable structs. Instead: omit defaults, pass explicit values at every call site. FakeData.swift is the canonical source of fake defaults."
  - "macOS-unavailable modifiers: `.keyboardType` is iOS-only. Any UIKit-backed modifier in shared SwiftUI code must be wrapped in `#if os(iOS) ... #endif` to pass macOS static analysis (which runs even though the package targets iOS 17)."
  - "FakeData isDraft flag: Chipotle (fast_casual_bowl) isDraft=false; Jimmy John's (sandwich_shop) and Central Market (grocery_prepared) isDraft=true (OQ-B pending). FakeData provider='fake' distinguishes from live API providers 'google'/'mock'."
  - "Color(.systemBackground) and Color(.systemGroupedBackground) require `#if os(iOS)` guards in PlanSummaryCard.swift because Color(UIKitName:) can't be resolved without contextual type on macOS toolchain. Existing views (FoodCardView, WeatherCardView) also have this same error — it's a project-wide pre-existing pattern."
  - "Domain models that become stored properties of Codable parent structs must themselves conform to Codable. PlanExplanation.swift required Codable added in Session 4 because Plan: Codable contains `let llmSummary: PlanExplanation?`. Check parent's Codable conformance when adding new model properties."
  - "PlanExplanationDTO uses camelDecoder (.iso8601 dateDecodingStrategy) so `generatedAt: Date` decodes directly from the ISO 8601 datetime string the Python backend produces via Pydantic. No custom CodingKeys or init needed."
  - "Session 4 lesson: PlanCoreDTO has a custom init(from:) — new optional fields must be added to (a) the stored property list, (b) CodingKeys enum, (c) the custom init via decodeIfPresent, AND (d) toModel(). All four sites must be updated or the field will silently decode as nil."
  - "Session 5 (Doubles) lesson: #Preview blocks with `return` statements produce a macOS-toolchain error ('cannot use explicit return statement in body of result builder ViewBuilder'). This is a pre-existing project-wide pattern (SignInView, TournamentListView, TournamentCreateView all had it before doubles). Not a regression — do not count as new errors."
  - "Session 5 (Doubles) lesson: When adding new required (non-optional) fields to Plan.swift, FakeData must pass ALL of them at every call site. `matchType: .singles` was added explicitly to `dallasPlan`; new `dallasDoublesPlan` with `matchType: .doubles` was added alongside. The `dallasPlanEnvelope` wraps both for preview use."
  - "Session 5 (Doubles) lesson: PlanEnvelope should NOT conform to Hashable — Plan itself is not Hashable, so Hashable cannot be synthesized on a struct containing Plan?. Declare PlanEnvelope as `Codable, Sendable` only."
  - "Session 5 (Doubles) lesson: @EnvironmentObject projected-value binding ($appState.foo) is immutable on macOS toolchain. Use an explicit Binding(get:set:) computed var instead. See matchTypeBinding in TournamentDashboardView.swift."
  - "Session 5 (Doubles) lesson: resolveActivePlan() helper is needed to extract Plan from PlanEnvelope in a @ViewBuilder body. `let` bindings inside @ViewBuilder are not allowed on some macOS toolchain versions — push logic to a helper method."
  - "Phase 8 (Nutrition-First IA) lesson: PlanEnvelope moved from singular singlesPlan/doublesPlan to arrays singlesPlans/doublesPlans. Grep for '.singlesPlan' and '.doublesPlan' after this migration to confirm zero live references (comments OK)."
  - "Phase 8 lesson: Repository should NOT set appState fields directly — it doesn't hold a reference to AppState. Put post-decode side-effects (like selectedMatchId assignment) in AppState's async loader methods instead."
  - 'Phase 8 lesson: onChange(of:) syntax: use the iOS 17 two-parameter form { _, newValue in } to match existing codebase pattern (TournamentCreateView, MatchCreateView). The deprecated single-parameter form may produce warnings.'
  - 'Phase 8 lesson: WeatherCardView compact: Bool = false pattern -- default-valued init params on Views are safe (not Codable). Do not confuse with the no-defaults rule on Codable structs.'
  - 'Phase 8 lesson: ScheduleStripView ForEach uses id: element.matchId on enumerated array because Plan is Identifiable on id (plan UUID) not matchId. matchId identity is intentional for chip-per-match semantics.'
  - 'Phase 8 lesson: NextAction must conform to Codable (not just Hashable) because Plan: Codable contains nextAction: NextAction?. Same Codable-parent rule as PlanExplanation in Session 4. Verified in NextAction.swift.'
