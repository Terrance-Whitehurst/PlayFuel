patterns_learned:
  - "anti-silent-failure: write files step by step, verify with find/grep before returning"
  - "FakeData UUID determinism: use fixed UUID strings (AAAA0001-...) so Phase 3 integration tests can reference known IDs"
  - "SwiftUI Package iOS 17+: executableTarget with @main App protocol works cleanly"
  - "UnevenRoundedRectangle is iOS 17+ only - safe here but document if targeting older OS"
  - "TimelineEventKind switch exhaustiveness: TimelineView.swift has TWO exhaustive switches (kindIcon + kindColor). Adding new enum cases requires updating both. No default: clause - compile breaks immediately on missing cases."
  - "Enum sync discipline: TimelineEventKind raw values are camelCase strings; Python backend uses identical strings in playfuel_api/models/enums.py. Any new case must be added to BOTH simultaneously."
  - "Stored-property defaults vs synthesized memberwise init: in some Swift/macOS toolchain combos, struct properties with `= default` confuse the synthesized init for Codable structs. Safe pattern: NEVER use stored-property defaults on Codable structs. Instead: omit defaults, pass explicit values at every call site. FakeData.swift is the canonical source of fake defaults."
  - "macOS-unavailable modifiers: `.keyboardType` is iOS-only. Any UIKit-backed modifier in shared SwiftUI code must be wrapped in `#if os(iOS) ... #endif` to pass macOS static analysis (which runs even though the package targets iOS 17)."
  - "FakeData isDraft flag: Chipotle (fast_casual_bowl) isDraft=false; Jimmy John's (sandwich_shop) and Central Market (grocery_prepared) isDraft=true (OQ-B pending). FakeData provider='fake' distinguishes from live API providers 'google'/'mock'."
  - "Color(.systemBackground) and Color(.systemGroupedBackground) require `#if os(iOS)` guards in PlanSummaryCard.swift because Color(UIKitName:) can't be resolved without contextual type on macOS toolchain. Existing views (FoodCardView, WeatherCardView) also have this same error - it's a project-wide pre-existing pattern."
  - "Domain models that become stored properties of Codable parent structs must themselves conform to Codable. PlanExplanation.swift required Codable added in Session 4 because Plan: Codable contains `let llmSummary: PlanExplanation?`. Check parent's Codable conformance when adding new model properties."
  - "PlanExplanationDTO uses camelDecoder (.iso8601 dateDecodingStrategy) so `generatedAt: Date` decodes directly from the ISO 8601 datetime string the Python backend produces via Pydantic. No custom CodingKeys or init needed."
  - "Session 4 lesson: PlanCoreDTO has a custom init(from:) - new optional fields must be added to (a) the stored property list, (b) CodingKeys enum, (c) the custom init via decodeIfPresent, AND (d) toModel(). All four sites must be updated or the field will silently decode as nil."
  - "Session 5 (Doubles) lesson: #Preview blocks with `return` statements produce a macOS-toolchain error ('cannot use explicit return statement in body of result builder ViewBuilder'). This is a pre-existing project-wide pattern (SignInView, TournamentListView, TournamentCreateView all had it before doubles). Not a regression - do not count as new errors."
  - "Session 5 (Doubles) lesson: When adding new required (non-optional) fields to Plan.swift, FakeData must pass ALL of them at every call site. `matchType: .singles` was added explicitly to `dallasPlan`; new `dallasDoublesPlan` with `matchType: .doubles` was added alongside. The `dallasPlanEnvelope` wraps both for preview use."
  - "Session 5 (Doubles) lesson: PlanEnvelope should NOT conform to Hashable - Plan itself is not Hashable, so Hashable cannot be synthesized on a struct containing Plan?. Declare PlanEnvelope as `Codable, Sendable` only."
  - "Session 5 (Doubles) lesson: @EnvironmentObject projected-value binding ($appState.foo) is immutable on macOS toolchain. Use an explicit Binding(get:set:) computed var instead. See matchTypeBinding in TournamentDashboardView.swift."
  - "Session 5 (Doubles) lesson: resolveActivePlan() helper is needed to extract Plan from PlanEnvelope in a @ViewBuilder body. `let` bindings inside @ViewBuilder are not allowed on some macOS toolchain versions - push logic to a helper method."
  - "Phase 8 (Nutrition-First IA) lesson: PlanEnvelope moved from singular singlesPlan/doublesPlan to arrays singlesPlans/doublesPlans. Grep for '.singlesPlan' and '.doublesPlan' after this migration to confirm zero live references (comments OK)."
  - "Phase 8 lesson: Repository should NOT set appState fields directly - it doesn't hold a reference to AppState. Put post-decode side-effects (like selectedMatchId assignment) in AppState's async loader methods instead."
  - 'Phase 8 lesson: onChange(of:) syntax: use the iOS 17 two-parameter form { _, newValue in } to match existing codebase pattern (TournamentCreateView, MatchCreateView). The deprecated single-parameter form may produce warnings.'
  - 'Phase 8 lesson: WeatherCardView compact: Bool = false pattern -- default-valued init params on Views are safe (not Codable). Do not confuse with the no-defaults rule on Codable structs.'
  - 'Phase 8 lesson: ScheduleStripView ForEach uses id: element.matchId on enumerated array because Plan is Identifiable on id (plan UUID) not matchId. matchId identity is intentional for chip-per-match semantics.'
  - 'Phase 8 lesson: NextAction must conform to Codable (not just Hashable) because Plan: Codable contains nextAction: NextAction?. Same Codable-parent rule as PlanExplanation in Session 4. Verified in NextAction.swift.'
  - 'Phase 8.1 (Header Bubbles) lesson: WeatherSnapshot flags are accessed via flags.contains(.rain_risk) etc. - NOT via individual boolean properties like .flagRainRisk. Spec used the wrong field names; corrected during pre-build verification.'
  - 'Phase 8.1 lesson: PlanExplanation.scenarioExplanations exists (PM Verification finding was wrong). It is intentionally NOT rendered in PlanSummarySheet - ScenarioCardView is the correct surface for per-scenario breakdowns. Not rendering a field != the field not existing.'
  - 'Phase 8.1 lesson: @ViewBuilder does not support let bindings on older macOS toolchains. When the same resolved value (e.g. resolveActivePlan) is needed multiple times in a @ViewBuilder body, call the helper function multiple times rather than caching in a let. Trivial functions make this safe.'
  - 'Phase 8.1 lesson: QA-IA-1 fix requires hoisting safety-critical elements (EmergencyStrip) into envelopeContent() ABOVE the conditional Picker - not inside planContent(). planContent() runs after Picker is already rendered. Always put safety UI in the outermost context-establishing builder.'
  - 'Phase 8.2 lesson: DurationFormatting enum in Formatting/ subdirectory is auto-discovered by Package.swift (path: Sources/PlayFuel covers the whole tree). No Package.swift edits needed for new subdirectories.'
  - 'Phase 8.2 lesson: Raw integer + "min" display sites: grep for "(\\(.*) min" and "\\(.*m)\"" in Views/ to find them. Sites converted: ScenarioCardView (4 sites), MatchCreateView (durationOptions labels), NextActionCard (minsUntil badge), FoodCardView (driveTimeMin). Leave alone: Date-formatted strings, RelativeDateTimeFormatter, static strings pulled from backend (llmSummary/nextAction.detail).'
  - 'Phase 8.2 lesson: MatchCreateView durationOptions can be refactored to a zip(names, values).map pattern to compute friendly labels dynamically - cleaner than duplicating the label string for each case.'
  - 'Phase 8.2 lesson (BUILD FIX): Any time FE adds a NEW file (especially in a NEW subdirectory like Formatting/), xcodegen generate MUST be re-run from apps/ios/PlayFuel/ before the user presses ⌘R. xcodegen auto-discovers all Swift files under path: Sources/PlayFuel recursively, but the committed pbxproj will not include them until regenerated. Lesson: every FE delegate that creates new files should end with `xcodegen generate && xcodebuild ... build` to surface this immediately. Do NOT rely on --reload or pbxproj being fresh from a prior session.'
  - 'Phase 8.3 lesson: DateFormatting.swift (new in Formatting/) handles both Date→String via Date.FormatStyle (iOS15+) AND String→String via asClockTimeFromISO (ISO8601 parse + format, falls through unchanged for non-ISO like FakeData human-readable strings). Never widen TimelineEvent.time to Date while FakeData contains non-ISO sentinel strings like "During Match", "Post-Match".'
  - 'Phase 8.3 lesson: TimelineEvent.time is a String. FakeData uses human-readable strings ("6:00 AM", "During Match"). Backend emits ISO 8601 ("2026-04-28T19:00:00+00:00"). The asClockTimeFromISO extension is the correct fix at the display layer - not widening the model. One-liner fix in TimelineView.swift:42.'
  - 'Phase 8.3 lesson: NextActionCard.scheduledFor is already a Date rendered through formattedTime() (DateFormatter with h:mm a format). Not a leak. ScheduleStripView already uses ISO8601DateFormatter + DateFormatter. Only TimelineView line 41 was the ISO leak in this session.'
  - 'Dark Mode (Phase 8.4) lesson: Apple semantic colors were already in use throughout (Color(.systemBackground), Color(.secondarySystemBackground), Color.primary/.secondary). Only 2 actual hardcoded gray color fixes needed: FoodOptionDeck.swift + FoodOptionDetailSheet.swift (Color.gray.opacity → Color(.systemFill)). PlanSummaryCard Color.white is in #else macOS branch only - correct, keep.'
  - 'Dark Mode lesson: Brand AccentColor defined in Assets.xcassets/AccentColor.colorset with light #227F52 and dark #3DB87D variants. All Color.accentColor references in views (HeaderBubble, NextActionCard, ScheduleStripView) now resolve to PlayFuel green automatically in both modes.'
  - 'Dark Mode lesson: AppearanceMode enum lives in PlayFuelApp.swift (same file as @main App struct). @AppStorage("appearance_mode") drives .preferredColorScheme() on the WindowGroup. DisclaimerView reads/writes same @AppStorage key via inline Picker - no separate AppearanceSettingsView file needed.'
  - 'Dark Mode lesson: #Preview("Dark") with .preferredColorScheme(.dark) is the canonical way to inspect dark mode in Xcode Canvas. Added 23 preview blocks across all View files (1 per file). EmergencyStrip and EmergencyBanner still render Color.red in dark preview - correct, safety-critical visual unchanged.'
  - 'Dark Mode hotfix lesson: xcodegen 2.45.4 does NOT generate a PBXResourcesBuildPhase for .xcassets even when listed under resources: in project.yml - regardless of optional: true or type: folder.assetcatalog. The xcassets must be manually patched into project.pbxproj with 5 edits: (1) PBXBuildFile entry, (2) PBXFileReference entry with lastKnownFileType = folder.assetcatalog, (3) PBXGroup for Resources directory + update root group, (4) PBXResourcesBuildPhase section, (5) target buildPhases list includes the new phase UUID. After manual patch, grep -c "Assets.xcassets" project.pbxproj → 4 hits. Build then produces Assets.car in the .app bundle, confirming AccentColor and PlayFuelGreen color sets compile. NOTE: future xcodegen generate WILL OVERWRITE this manual patch - re-apply the 5 edits each time. UUIDs used: AA0000AA0000AA0000AA0001 (FileRef), AA0000AA0000AA0000AA0002 (BuildFile), AA0000AA0000AA0000AA0003 (Phase), AA0000AA0000AA0000AA0004 (Group). This patch was successfully re-applied in the Profile-Button delegate (Phase 8.5) and the History-Dashboard delegate (Phase 8.6) after xcodegen regen.'
  - 'Phase 8.6 lesson (auto-gen + history dashboard): .task(id: tournament.id) on TournamentDashboardView fires generatePlan(for:) on first appear AND whenever tournament.id changes (tournament switch). AppState.generatePlan(for:) already existed with the right signature - zero new AppState API needed. The method sets .loading before the async call and .loaded/.failed after, driving the existing ProgressView/errorView/envelopeContent switch in TournamentDashboardView. Auto-gen is idempotent per OQ-IA-9 upsert - re-firing on tournament switch is safe.'
  - 'Phase 8.6 lesson: TournamentHistoryEntry model + FakeHistoryData (10 entries over ~6 months) + DashboardView (month-switcher + CalendarMonthGrid + entry list + Recent list) + CalendarMonthGrid (LazyVGrid, 7-col, leading-empty-cell math via calendar.component(.weekday, from: firstDayOfMonth) - 1) + TournamentHistoryDetailSheet (List insetGrouped, 5 conditional sections) - all 5 new files compile cleanly. ProfileMenuSheet Dashboard row wired: showDashboard state + .sheet presenting DashboardView at .large detent. FakeHistoryData.dummyHistory uses daysAgo() helper derived from Date() so dates stay current year-over-year (no hardcoded 2026). UUID convention for history entries: 00000001-0000-0000-0000-000000000001 through 0000000a-0000-0000-0000-00000000000a (hex-only sequential).'
  - 'CRITICAL UUID RULE: UUID(uuidString:)! force-unwrap with string literals crashes at runtime if the string contains ANY non-hex character. Hex chars are ONLY 0-9 and a-f (A-F). H, I, S, T, G, J, K, etc. are NOT valid hex. HIST0001-... looks valid but causes Fatal error: Unexpectedly found nil at first access. The regex to audit for latent crashes: grep -rEn "UUID\(uuidString:\s*\"[^\"]*[g-zG-Z][^\"]*\"" Sources/ - 0 hits required. Safe options: (a) Use UUID() for random IDs in fake data, (b) use sequential hex-only strings like 00000001-0000-0000-0000-000000000001, (c) use a helper func uuid(_ s: String) -> UUID { UUID(uuidString: s) ?? UUID() }. NOTE: A-F are valid hex - AAAA0000, BBBB0001, CC000001, DD000001 are all safe.'
  - 'Phase 8.7 (Player Scouting) lesson: @State variables used in .sheet isPresented / .task / etc. MUST be declared in the struct before the view body - the SwiftUI compiler will report "cannot find X in scope" for every reference even if the variable exists elsewhere in scope. Specifically: showPlayerSearch, showAddPlayerInline, opponentPlayerId, playerSearchText, availablePlayers were all omitted from MatchCreateView and caused 12+ cascading errors. Always add ALL @State/let/computed that a block references before the body var block.'
  - 'Phase 8.7 lesson: if-else { ForEach(collection) } inside List {} causes "cannot convert [T] to Binding<C>" cascading errors on some toolchain versions. The ViewBuilder for List cannot always infer ForEach inside an else branch. Fix: move ForEach to the top level of List {}, use .overlay for the empty state, and put the conditional add-new row BELOW the ForEach at the same List level. This pattern is safe and resolves the Binding inference failure.'
  - 'Phase 8.7 lesson: .foregroundStyle(.accentColor) produces "type ShapeStyle has no member accentColor" - use .foregroundStyle(Color.accentColor) (explicit Color prefix). This is a pre-existing project pattern in HeaderBubble, NextActionCard, TournamentDashboardView. Never use the shorthand .accentColor with foregroundStyle; always qualify with Color.'
  - 'Phase 8.7 lesson: Smart/curly quotes (U+201C " / U+201D ") inside Swift string literals compile fine BUT the Edit tool cannot match text containing them reliably. When writing Swift string content via tools, use escaped ASCII alternatives or straight ASCII quotes inside strings. Use Python-based Bash rewrites for files containing curly quotes.'
  - 'Post-match eval lesson: String extension .nilIfEmpty is a clean idiom for form-save cleanup (empty fields become nil instead of empty string). Define once in the Form file using private extension String { var nilIfEmpty: String? { isEmpty ? nil : self } }.'
  - 'Post-match eval lesson: For optional Int ratings that are 0=unset, use (value > 0 ? value : nil) at save time to keep the UX model (0=none) separate from the domain model (nil=optional). No separate Bool "isSet" state needed.'
  - 'Post-match eval lesson: AppState.repository is a let property, directly accessible from views via @EnvironmentObject appState.repository. No AppState wrapper method needed for new Repository calls from views.'
  - 'Post-match eval lesson: pbxproj UUID pattern for this project uses CC00NNcc00NN format (CC0017 through CC0021 for the 5 new eval files). The last used were CC0016 (AddPlayerNoteSheet). Next delegate should start at CC0022.'
  - 'Post-match eval lesson: DateFormatting.clockTime takes a Date parameter. For ISO 8601 String inputs (like Plan.scheduledStart), use the .asClockTimeFromISO extension on String, not DateFormatting.clockTime(from: String).'
  - 'Post-match eval lesson: MatchDetailView presented as .sheet avoids NavigationStack complexity while staying consistent with the profile/settings/dashboard sheet pattern. The NavigationStack inside the sheet provides its own Done button.'
  - 'Post-match eval lesson: Dynamic list editors (add/remove rows, max N items) in SwiftUI Form work cleanly with ForEach over an indices range + remove(at:) on the binding array. The "Add another" Button uses a plain buttonStyle to avoid the blue link style in Form cells.'
