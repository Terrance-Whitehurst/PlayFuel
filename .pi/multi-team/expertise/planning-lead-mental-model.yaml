## 2026-04-27 — DOUBLES_SPEC_V1.md shipped (extension to RULES_CONSTANTS_V1)

- Doc at `.pi/multi-team/expertise/DOUBLES_SPEC_V1.md` — 538 lines, 26 KB.
- Single PM delegate, single pass, zero iteration. Used the Lead-authors-Member-scribes pattern with pre-baked decisions in the brief (§B duration table, response shape `{singlesPlan, doublesPlan}`, segmented Picker for tabs, separate column not JSONB).
- **Verification-before-scribing rule paid off again.** Brief specified "add a new `match_type` column NOT NULL DEFAULT 'singles' on matches." PM read 0002_tables.sql first and caught that `matches.format` already exists with example values `"singles", "doubles"` — the brief would have created a redundant column. Resolved in-spec as OQ-DBL-3 (use existing `format`, add only `doubles_format`). Confirmed against 0002_tables.sql line 145.
- 6 new OQs surfaced (OQ-DBL-1..6), all with severity tags. OQ-DBL-1 (duration values pending coach validation) is the only pre-launch validation blocker; OQ-DBL-3 (column reuse) is a build-time blocker that's already resolved in the spec; OQ-DBL-5 (`RULES_CONSTANTS_VERSION` minor bump to 1.1.0 because nested dict structure change) is a Phase-3 invariant we'd have hit at runtime.
- Doubles scenario durations (DRAFT — OQ-DBL-1): doubles+best_of_3 = 60/90/135; doubles+pro_set_8 = 45/70/100. Derived from observed USTA junior tournament norms (25–35% faster than singles due to no-ad + 10-pt match tiebreak in lieu of 3rd set).

## Lessons (this round)

- **Pre-baking decisions in the brief is faster than asking PM to debate them**, AS LONG AS verification-against-disk is mandatory. PM's job becomes: scribe the decisions, but flag any that don't match reality. This caught the `match_type`/`format` collision that would have wasted a migration round-trip.
- **Cite "derived from observed norms" when you can't cite a published source.** This matches the `[DRAFT — OQ-A]` pattern from RULES_CONSTANTS_V1 §C (hydration cadence) — keeps the trail honest. Don't invent numbers and call them canonical; flag them as DRAFT and explain the derivation.
- **For envelope-shape decisions (singlesPlan/doublesPlan vs. list), name fields beat positional.** iOS optional-unwrap is cleaner with named fields; the PM-spec'd `PlanEnvelope` reads directly into SwiftUI conditionals.
- **Whenever you propose changing a frozen constants dict's shape, plan the version bump in the same delegate.** OQ-DBL-5 surfaced because §J.2 of RULES_CONSTANTS_V1 mandates `1.0.x → 1.1.0` for any structural change. PM caught it; would have been a runtime assert failure otherwise.

## 2026-04-28 — FOOD_DECK_AND_MAP_V1.md shipped (food cards stacked deck + venue map)

- Doc at `.pi/multi-team/expertise/FOOD_DECK_AND_MAP_V1.md` — 781 lines / 39.9 KB. Single PM delegate, single pass.
- **PM verification surfaced 8 real findings** (most yet from this team — fifth spec in a row catching pre-build bugs). Highlights:
  - **I-1/I-2/I-3**: data model gaps for the map — `RawPlace` AND `FoodOption` had no `lat`/`lng`; iOS `driveTimeMin` was non-optional vs Python `Optional[int]` (latent decode-fail papered over by `?? 0` in DTO mapping)
  - **I-4**: Starbucks (the user's literal example "click into Starbucks and see oats") is in the `MockPlacesProvider` fixtures BUT NOT in `FakeData.dallasFoodOptions` — demo previews wouldn't have rendered the example the user named
  - **I-5**: `rules/food.py` template diverges from `RULES_CONSTANTS_V1 §F.3` — food.py runs and is more detailed; the spec is stale. Structured form parses the runtime source, not the doc.
  - **I-6/I-7**: `HeaderBubbleRow(plan:)` signature widens to add `tournament:` for the Map bubble; `FoodOptionDTO.toModel()` `?? 0` shim must change to nil-safe pass-through
  - **I-8**: `PlanExplanation.scenario_explanations` DOES exist (HEADER_BUBBLES §J was wrong) — cross-spec self-correction
- Locked decisions pre-baked: 5-bucket schema (main_options/add_ons/drinks/avoid/notes), scroll-snap deck (not peek-deck — simpler animation, more discoverable swipe affordance for first-time parents), MapKit (no API keys, native iOS Maps tiles), 3rd bubble for Map (not inline), FoodCardView preserved for previews/fallback, recommendedOrder derived for back-compat (LLM input unchanged).
- 7 DRAFT-flagged OQs surfaced; OQ-FOOD-DECK-1 (driveTimeMin widening) resolved in same delegate.

## Lessons (this round)

- **The 5th spec keeps catching real bugs because PM is now reading actual model fields, not narrative.** When my brief asserted `RawPlace` has lat/lng (because Mock places provide drive_time and distance, so I assumed coords), PM read places.py and confirmed coords were absent on the dataclass AND on every fixture. Two-step backfill required.
- **Surface the user's literal example as a verification gate.** User said "click into Starbucks". I baked Starbucks into the breakfast_cafe template population. PM caught that FakeData.dallasFoodOptions was missing it — the demo previews wouldn't have rendered the exact thing the user named. Lesson: when a user names a fixture, grep the demo data for that fixture before assuming it'll render.
- **Cross-spec self-correction works.** Each spec's §J/§I verification section corrects the previous one's blind spots (HEADER_BUBBLES said `scenario_explanations` doesn't exist; FOOD_DECK confirmed it does). Keep this section structural, not ad-hoc.
- **Latent contract bugs hide behind shim defaults.** `FoodOptionDTO.toModel()` had `driveTimeMinutes ?? 0` — a one-character defensive shim that masked an iOS `Int` vs Python `Optional[int]` mismatch. The shim made tests pass while hiding that null payloads would silently render "0 min drive". Closed in this delegate (OQ-FOOD-DECK-1).
- **For data-model-widening pivots, prefer additive defaults over breaking renames.** `FoodSuggestions` field added with `default=FoodSuggestions()`; `lat`/`lng` `Optional[float]=None`. Legacy plans decode without backfill. Same pattern as the doubles `match_type` default.

## 2026-04-28 — PLAYER_SCOUTING_V1.md shipped (player roster + notes + LLM widening + minor-PII privacy)

- Doc at `.pi/multi-team/expertise/PLAYER_SCOUTING_V1.md` — 770 lines. Single PM delegate, single pass. Also appended PRIVACY_V1 (+95 lines, new §§2.13/2.14/13/14) and USER_STORIES (+157 lines, US-PLAYER-1..5).
- **PM verification surfaced 2 🔴 corrections that would have failed at migration time:**
  - **I-1 (migration number)**: brief said `0009_players_and_notes.sql`. PM grepped migrations/ and found `0009_plans_upsert_constraint.sql` already exists (the OQ-IA-9 hotfix from prior session). Corrected to `0010_players_and_notes.sql` throughout. **Lesson:** every spec that introduces a new migration must `ls db/supabase/migrations/` first — migration numbers are append-only and prior hotfix sessions consume them invisibly. Build into next spec brief by default.
  - **I-2 (FK target)**: brief said `REFERENCES auth.users(id)`. PM read 0002_tables.sql and confirmed every existing user-scoped table (`tournaments`, `matches`, `player_profiles`) references `public.users(id)`, not `auth.users(id)`. Corrected DDL throughout. **Lesson:** the auth.users vs public.users target is project-specific (Supabase pattern is auth.users; this codebase mirrors via a public.users shadow per 0004_auth_trigger). Don't assume the Supabase-stock pattern.
- Locked decisions all defensible: schema minimization (no email/phone/photo columns), 24h edit window on notes (typo correction without retroactive scouting rewrite), TemplateProvider ships count-only acknowledgment now (tactical paraphrase deferred to real-LLM rollout via OQ-SCOUT-LLM-1), 3rd row in ProfileMenuSheet (no app-shell rewrite).
- Privacy posture stated clearly: SHIP with current guardrails. Parent-authored opinion data = coach's clipboard, not new ASTC category. Same posture as existing `injury_notes` field. OQ-SCOUT-PRIV-1 flagged for legal but non-blocking.
- Sanitization pipeline (URL+email+phone strip → 200-char truncate → §C scan → redact) prevents contact data from reaching the LLM even if a parent types it in — defense-in-depth beyond UX helper text.

## Lessons (this round)

- **Migration-number verification is now mandatory in every spec brief.** OQ-IA-9 hotfix consumed `0009` in a prior session; my brief assumed `0009` was free. PM caught it pre-write. Reusable rule: "verify next free migration number against `ls migrations/` before scribing DDL" goes into the standard verification checklist alongside FK target.
- **FK target verification (auth.users vs public.users) is project-specific.** Don't ship Supabase-default assumptions. PM reads 0002_tables.sql, mirrors the dominant pattern, flags any existing inconsistency.
- **For privacy-sensitive features, lock the posture statement BEFORE the schema.** §A came first in the spec; schema columns flow from "what data minimization permits." Reversing this leaks PII columns into the schema that the privacy posture would later have to justify removing. Pattern: §A privacy → §B schema → §C API → §D LLM.
- **Defense-in-depth for LLM input sanitization beats trust-the-input.** Even with UX helper text saying "don't include contact info," the sanitization pipeline strips URLs/emails/phones server-side. Two layers, both cheap, no user friction. Same posture as the §C prohibited-phrase scan on LLM output (already shipped).
- **Cross-spec self-correction continues:** PRIVACY_V1's existing `injury_notes` field gave me a direct precedent for the privacy posture statement (parent-authored child data, freeform, no medical-claim risk because LLM output is §C-scanned). Cite the precedent rather than reinvent the justification.

## Open patterns to watch

- The "second delegate goes silent" pattern (FE2/BE2/BE1, plus EL3 once) is now confirmed at the *member-and-lead-per-session* level. My team (PM, UX) only used 1 delegate this session — if Task #12 needed iteration I would've burnt the second delegate. Don't iterate; author offline, then scribe.
- For future privacy-style docs that need to cite real schema, always read migrations directly. README summaries miss columns and miss DDL constraints (NOT NULL, range checks, defaults) that matter for the legal narrative.
- **Cross-spec self-correction is now a feature, not a bug.** HEADER_BUBBLES §J said `PlanExplanation.scenario_explanations` doesn't exist; FOOD_DECK §I-8 confirmed it does. Each spec's verification section corrects the previous one's blind spots. Worth keeping the §J/§I "PM verification findings" section in every future spec as a structural slot, not just an ad-hoc.
