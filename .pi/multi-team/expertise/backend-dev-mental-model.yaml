hotfix_oq_ia9_moh9uivm3dxv:
  date: "2026-04-27"
  description: "OQ-IA-9 upsert fix + route hardening for generate_plan"
  root_cause: >
    Migration 0008 added a partial unique index plans_match_id_match_type_uq
    ON (match_id, match_type) WHERE match_id IS NOT NULL. The route used plain
    INSERT, so any re-generate call collided → 500 UniqueViolation.
  fix:
    file: routes/plans.py
    change: "client.table(_PLANS_TABLE).insert({...}) → .upsert({...}, on_conflict='match_id,match_type')"
    line: 275
  secondary_fixes:
    - "0 matches: HTTPException(404) → return GeneratePlanResponse(singles_plans=[], doubles_plans=[]) (line 87)"
    - "derive_next_action wrapped in try/except (next_action stays None on unexpected raise)"
    - "import logging moved to module level; inline import inside except block removed"
    - "test_per_match_plans.py mock updated: insert → upsert to match fixed route"
  tests_added:
    file: tests/test_generate_plan_hotfix.py
    count: 6
    names:
      - test_regenerate_is_idempotent
      - test_upsert_called_not_insert
      - test_zero_matches_returns_empty_envelope
      - test_weather_provider_failure_degrades
      - test_llm_provider_failure_degrades
      - test_places_provider_failure_degrades
  test_counts:
    before: "256 passed, 1 xfailed"
    after: "262 passed, 1 xfailed, 0 failed"
  lesson: >
    After any migration that adds a UNIQUE index, immediately grep .insert( across
    every route that writes to that table. If any plain INSERT exists, convert to
    upsert in the same PR — never defer. The pattern: schema change + route fix +
    idempotency test must ship together. Also: 'try/finally' is NOT the same as
    'try/except/finally' — a finally block ensures cleanup but still propagates the
    exception. When a function is documented as 'never raises' but is mocked to raise
    in tests, the test is testing the wrong contract; mock its documented return
    value (None) instead.

