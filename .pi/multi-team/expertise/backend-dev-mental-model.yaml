  test_counts:
    before: '262 passed, 1 xfailed'
    after: '277 passed, 1 xfailed, 0 failed'
  critical_finding: >
    If you change LLM template strings from "75 min" to "1 hr 15 min", the old
    _DURATION_RE regex would match "15 min" (the minute component) and check
    if 15 is canonical -> FALSE POSITIVE. Fix: update _DURATION_RE to handle
    both hr-based (group 1 = hr, group 2 = optional min) and standalone
    (group 3 = min) patterns. Convert each match to total_mins for validation
    against _CANONICAL_DURATIONS_INT (int frozenset, not string frozenset).
  regex_design:
    pattern: 'two-arm alternation: hr-based arm (groups 1+2) then standalone-min arm (group 3)'
    property: 'hr-arm consumes full X-hr-Y-min before standalone arm can match Y-min separately'
    drive_times_safe: '1-digit drive times (5 min, 3 min) excluded by 2-digit minimum on standalone arm'
  strings_left_alone:
    - 'rules/next_action.py copy_map: "30 min" — sub-60, friendly_duration(30) == "30 min" already'
    - 'rules/hard_coded_strings.py: no minute counts in the safety/disclaimer strings'
    - 'LLM safety test _clean_explanation: fixed strings "75 min match" still canonical'
  no_test_updates_needed: >
    Existing test assertions use fixed canonical strings (75, 120, 180 min) that still
    pass the updated validator. test_non_canonical_duration_is_caught still triggers on
    95 min. No test assertions check the exact narrative prose from TemplateProvider.

