# ---------------------------------------------------------------------------
# Risk patterns observed
# ---------------------------------------------------------------------------

risk_patterns:
  spec_distillation_loss:
    observation: |
      The "master spec" (§14, §16, §17, §19, §28, etc.) was never committed.
      Phase 0 docs in .pi/multi-team/expertise/ are the only source of truth.
      Section citations like "§19 pseudocode" point to text that does not exist
      verbatim on disk; only the behavior tables survive.
    mitigation: |
      Treat the Phase 0 expertise docs as the canonical spec. When reading
      future references to "§N", resolve them to the distilled file containing
      that table. Always check whether engineering decisions are pulling from
      original spec vs derived material — flag derived items aggressively.

  silent_delegate_failure_RESOLVED_PARTIAL:
    note: |
      Session mogfjh9hslqr UPDATE — the "silent drop on second delegate" pattern
      may be partially mitigatable by NEVER issuing a second delegate. Single
      well-structured first delegates with write-as-you-go ordering have
      consistently shipped 90%+ of large file batches even under the
      "[error]" wrapper. The wrapper itself is misleading; the underlying
      stream is partial-success, not catastrophic failure. Treat the wrapper
      as informational, verify via filesystem, and accept partial-completion
      as a normal outcome rather than retrying.

  silent_delegate_failure:
    observation: |
      In session mog052owzfj7, two consecutive large-payload delegates to
      Backend Dev 1 returned empty. Same happened to Frontend Dev 1 after a
      ~10KB payload. First small delegate succeeded fine.

      EL2 follow-up (same session, Round 1 Task #3 SwiftUI prototype):
      - Frontend Dev 2 silent on FIRST delegate (large brief), silent on
        small follow-up ping, AND silent on one-word "reply with one word"
        ping. Member appears fully unreachable, not just payload-sensitive.
      - Backend Dev 2 replied "Pong" to one-word ping cleanly, then went
        silent on the same large brief, then silent on small follow-up.
        Suggests the failure mode is: first small payload OK, any subsequent
        delegate (regardless of size) may silently drop. Could also be
        per-member quota or session-wide rate limiting.

      Session mog2owgx4ixe (FRESH session, Task #3 SwiftUI retry):
      - Both FE2 and BE2 cleanly answered 'ready' to one-word liveness pings
        in parallel as the FIRST delegate. Encouraging start.
      - FE2 then went silent on the real ~4KB SwiftUI task brief (well under
        the 5KB heuristic). Filesystem check confirmed zero files written.
      - PATTERN CONFIRMED ACROSS SESSIONS: FE2/BE2 reliably ack the FIRST
        small delegate, then silently drop the SECOND delegate regardless
        of payload size. The 5KB heuristic does NOT explain this; the
        ordinal of the delegate (1st vs 2nd+) is the better predictor.
      - Did NOT try BE2 with the SwiftUI brief - high probability of same
        failure based on prior-session evidence.
    mitigation: |
      Avoid >5KB payloads to a single delegate. Split large content into chunks.
      For large file writes, send instruction first ("can you write this file?
      I'll send content in next message"), then send content.

      When BOTH team members are unreachable, do not loop — escalate to the
      Orchestrator immediately with: (a) what was attempted, (b) which
      members were tried, (c) filesystem evidence that no work was produced.
      The lead should not attempt the work themselves due to domain
      restrictions (apps/ is not in EL write domain).

      Open question: is there a delegate-call cooldown or per-session quota?
      If so, this should be documented at the framework level so leads can
      pace their delegations rather than burn budget on retries.

      WORKING THEORY (post mog2owgx4ixe): The failure may be tied to the
      delegate tool returning before the member's full work completes, OR
      the member's response being dropped between turns. One-word pings
      working for the FIRST delegate but not the SECOND is consistent with
      a per-member session-state issue, not a payload-size issue.

      RECOMMENDED ROUTING: For Engineering2's domain (mobile/SwiftUI), prefer
      borrowing Frontend Dev 3 via Orchestrator routing to Engineering3. FE3
      was the most reliable shipper last session. EL2 cannot delegate to FE3
      directly - only Engineering3's lead can - so escalation through the
      Orchestrator is the correct (and only) path.

      CONFIRMED in session mog2owgx4ixe Round 1: EL2 escalated → Orchestrator
      rerouted to EL3 → EL3 delegated to FE3 → FE3 shipped 22 files in one
      pass. The reroute pattern is the working playbook for any Engineering2
      task that needs frontend execution while FE2/BE2 silent-failure persists.

      EXTENDED in session mog2owgx4ixe Round 2 (Task #5 FastAPI):
      - BE1 first delegate: partial success. Wrote ~12/~28 files (pyproject,
        README, .env, settings, rules/{__init__, constants, hard_coded_strings},
        models/{__init__, enums, api, db}, src/__init__) then returned a
        "Backend Dev 1 error" with truncated trace. Files written are
        high-quality and consistent.
      - BE1 second delegate: completely silent return (no output text).
        Filesystem confirms no additional files written.

      RE-CONFIRMED in session mog5k1xastpq (Task #5 continuation):
      - Foundation from prior session (12 files) intact and excellent.
      - BE1 first delegate (this session): "[Backend Dev error]" wrapper but
        leaked discovery content (file tree + path) AND wrote 4 substantive
        files cleanly to disk before truncating: auth.py (HS256 verify),
        db.py (per-request supabase client w/ RLS via JWT), rules/buckets.py
        (half-open bucket classifiers), rules/weather.py (all 6 flags +
        derived extreme_heat_risk). Quality is excellent — production-ready.
      - BE1 second delegate (this session): completely silent return on a
        ~9KB comprehensive brief covering remaining 16 files. Filesystem
        check immediately after returned ENOENT for every expected target
        path (main.py, scenarios.py, plan.py, routes/*, tests/*).
      - PATTERN NOW QUADRUPLE-CONFIRMED across 3 sessions and 4 members
        (BE1, BE2, FE1, FE2): first delegate often partial-succeeds with
        "[error]" wrapper that still produces some files; second delegate
        in same session silent-drops regardless of payload size. The
        silent-drop is the dominant failure mode — DO NOT attempt a 3rd
        delegate to the same member, the budget is gone.
      - PATTERN: Same FE2/BE2 ordinal-2nd silent-drop pattern now CONFIRMED
        for Backend Dev 1 in this session as well. The failure is not
        team-2-specific; it's a per-member-per-session phenomenon affecting
        BE1, BE2, FE1, FE2 across at least two sessions. FE3/BE3 (Engineering3
        team) remain the only consistently-reliable shippers across BOTH
        sessions.
      - REROUTE PLAYBOOK now applies to Engineering1 backend tasks too: when
        BE1 partially completes then drops, escalate to Orchestrator to
        reroute REMAINING file list to Backend Dev 3 via Engineering Lead 3.
        BE3 can build on BE1's foundation (the camelCase decision + Pydantic
        models + constants are sound) — this is incremental work, not a
        rewrite.

  hardcoded_text_discipline:
    observation: |
      SAFETY_DISCLAIMERS.md §B (heat emergency text) is hard-coded — never
      LLM-generated. The same precedent should apply to other safety-adjacent
      strings: overrun warning, bag-food fallback, schedule conflict banner.
    mitigation: |
      Maintain a single HARD_CODED_STRINGS module in the backend. The LLM
      receives the structured plan with these strings already populated and
      must not modify them. This is enforceable in the system prompt + a
      post-LLM diff check.

