    - Validation Lead had explicitly classified this as 'pre-TestFlight blocker, NOT demo blocker' on the assumption demo would generate-plan exactly once. The user pressed it twice. Real demos don't honor your assumptions.
  delegated:
    - BD single delegate, no wrapper. Shipped 1 file edit (routes/plans.py — INSERT→upsert with on_conflict='match_id,match_type') + 1 new test file (test_generate_plan_hotfix.py, 6 tests) + 1 small mock update (test_per_match_plans.py: insert→upsert mock chain). Test count 256→262 + 1 xfail. Eval exit 0. on_conflict columns match migration 0008 partial unique index exactly.
  audit_findings:
    - 0 matches — was raising 404, changed to return empty envelope arrays 200. Reasonable since no-matches isn't a not-found-tournament; it's a valid empty state for a freshly created tournament.
    - Weather/Places/LLM call paths already had internal try/except returning None or [] — confirmed by code reading, no changes needed.
    - NextAction derivation was unwrapped — now wrapped in try/except, sets next_action=None on raise, plan still ships.
  lessons:
    - When Validation classifies an issue as 'pre-TestFlight, demo-safe' based on usage assumptions (e.g. 'demo generates once'), DOWNGRADE that classification. Real users press buttons twice. The honest classification of OQ-IA-9 was always 'demo blocker on second tap' — should have shipped the upsert in the IA pivot itself rather than deferring.
    - Pattern to add to brief checklist: 'after any migration that adds a UNIQUE index (partial or full), grep all routes hitting that table for `.insert(` calls and convert to `.upsert(on_conflict=...)` in the SAME pass.' This is now the second time a migration introduced a constraint that broke a route in a downstream session (first was nullable match_type in 0007 → not breaking, but tracked as OQ-DBL-7).
