session_2026_04_28_dark_mode_and_xcodegen_landmine:
  delivery: "Dark mode shipped via Apple semantic colors (Color.primary / Color(.systemBackground) / Color(.secondarySystemBackground)) + AccentColor.colorset and PlayFuelGreen.colorset in Assets.xcassets with light/dark variants. 23 #Preview('Dark') blocks added. Inline System/Light/Dark Picker added to existing DisclaimerView (FE went tighter than spec — no new file, @AppStorage('appearance_mode') + .preferredColorScheme on root WindowGroup). EmergencyStrip + EmergencyBanner kept literal Color.red + Color.white in both modes per safety lock. 2 Color.gray -> Color(.systemFill) swaps for DRAFT badges. Test count unchanged 291/1 xfail."
  xcodegen_landmine_DISCOVERED: |
    xcodegen 2.45.4 silently SKIPS generating PBXResourcesBuildPhase for .xcassets bundles. Neither removing `optional: true` from project.yml nor setting `type: folder.assetcatalog` produced the build phase. Result: BUILD SUCCEEDED but Assets.car never made it into the .app bundle initially -> Color.accentColor fell back to system blue, Color('PlayFuelGreen') returned nil, AppIcon at risk.
    QA caught it via `grep -c Assets.xcassets project.pbxproj` returning 0 + reading all 562 lines of pbxproj to confirm no PBXResourcesBuildPhase block existed.
    Fix: 5-site MANUAL pbxproj patch (PBXBuildFile + PBXFileReference + root PBXGroup child + new Resources PBXGroup + PBXNativeTarget buildPhases insertion + new PBXResourcesBuildPhase section). After patch: grep returned 4, Assets.car compiled into bundle, AccentColor + PlayFuelGreen baked in. xcodebuild BUILD SUCCEEDED.
  CRITICAL_FOLLOW_UP_RULE: |
    The 'every new-file FE delegate must run xcodegen generate' rule from session_2026_04_28_xcode_build_hotfix now has a sharp exception: running xcodegen WIPES the manual Resources build phase patch. Going forward, EVERY engineering brief that mentions xcodegen MUST also include:
      1. After xcodegen, verify `grep -c Assets.xcassets project.pbxproj` >= 3
      2. If grep returns 0, re-apply the 5-site Resources build phase patch (FE has the diff in this session's hotfix delivery)
      3. Long-term mitigation options to evaluate: upgrade xcodegen past 2.45.4 if a fix landed; OR pin pbxproj as source of truth and stop using xcodegen for resource-bundle changes; OR file the bug upstream
  qa_validation_quality_continues: "QA's pbxproj line-by-line read caught a real runtime regression that BUILD SUCCEEDED would have masked. Lesson reinforced: 'BUILD SUCCEEDED' is necessary but not sufficient — runtime resource resolution requires explicit asset bundle verification. Add to validation checklist for any session that touches Resources or Assets.xcassets."
  qa_dm_1_status: RESOLVED via 5-site manual pbxproj patch.

