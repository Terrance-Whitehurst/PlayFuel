project: PlayFuel
role: Engineering Lead 1 (backend / rules engine owner per PLAN.md)

# ---------------------------------------------------------------------------
# Architecture decisions made
# ---------------------------------------------------------------------------

decisions:
  oq_05_scenario_durations:
    decision: hardcoded module constants for MVP
    location: backend/app/rules/constants.py — SCENARIO_DURATIONS_MIN
    values: { short: 75, normal: 120, long: 180 }
    override_hierarchy:
      mvp: module constants only
      v1_1_deferred: player_profiles.scenario_duration_overrides JSONB
      v1_2_deferred: (age_bracket, match_format, surface) lookup table
    rationale: |
      USER_STORIES.md OQ-3 already pre-resolved as "hardcoded for MVP".
      All 5 canonical eval scenarios use literal 75/120/180.
      DB+RLS+UI = ~3 days of work for zero MVP value.
      Function signature reserves `duration_overrides` kwarg so v1.1 is additive.

  oq_13_gap_boundaries:
    decision: pseudocode wins over prose; half-open [a,b) is canonical
    food_buckets:
      bag_only:     "[0, 45)"     # gap < 45
      portable:     "[45, 90)"    # 45 ≤ gap < 90
      quick_pickup: "[90, 150)"   # 90 ≤ gap < 150
      light_meal:   "[150, ∞)"    # gap ≥ 150
    pickup_buckets:
      bring_portable:      "[0, 60)"
      pickup_during_match: "[60, 120)"
      wait_until_end:      "[120, ∞)"
    rationale: |
      SCENARIO_ACCEPTANCE.md table already aligns with pseudocode (90–149, ≥150).
      Half-open is canonical Python idiom.
      Boundary at 150 is operationally meaningless (149 vs 151 min ≈ same).
    resolves: SCENARIO_ACCEPTANCE.md OQ-1, OQ-2

  oq_14_negative_gap:
    decision: degraded plan + structured warning, NOT an error (HTTP 200)
    new_field: gap_status enum on every ScenarioPlan
    enum_values: [ok, tight, overrun, no_next_match]
    overrun_behavior:
      buckets: clamped to bag_only + bring_portable
      rewarm_up: null
      overrun_warning_payload:
        code: MATCH_OVERRUN
        severity: high
        minutes_over: abs(gap_min)
        message: "Match 1 may not finish before Match 2's estimated start time. Alert tournament desk if this scenario unfolds."
    plan_envelope_field: warnings[] (aggregates per-scenario warnings)
    rationale: |
      Erroring punishes the parent for tournament reality.
      Scenario 4 eval already prescribes overrun_warning + bag-food fallback.
      Degraded-but-rendered plan keeps iOS UI stable.

